version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.8.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'sp500_etl_secret_key_2024'
    SP500_DB_HOST: sp500-postgres
    SP500_DB_PORT: '5432'
    SP500_DB_USER: sp500user
    SP500_DB_PASS: sp500pass
    SP500_DB_NAME: sp500_dw
    AWS_DEFAULT_REGION: eu-west-1
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  volumes:
    - ./dags:/opt/airflow/dags
    - .:/opt/airflow/project
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:

  # Airflow metadata database
  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    ports:
      - "5433:5432"

  # SP500 data warehouse
  sp500-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: sp500user
      POSTGRES_PASSWORD: sp500pass
      POSTGRES_DB: sp500_dw
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sp500user"]
      interval: 5s
      retries: 5

  # Airflow init
  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com"
    restart: on-failure

  # Airflow webserver — http://localhost:8080
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  # Airflow scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  # Apache Superset — http://localhost:8088
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    environment:
      SUPERSET_SECRET_KEY: 'sp500_superset_secret_2024'
    ports:
      - "8088:8088"
    depends_on:
      sp500-postgres:
        condition: service_healthy
    restart: always

# This line intentionally left blank - see superset service update below
